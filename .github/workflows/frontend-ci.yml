name: Frontend CI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'frontend/**' # Adjust this path to match your frontend directory name
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'frontend/**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    # Define the working directory if your frontend is in a subfolder
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Using LTS, adjust if needed
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Dependencies
      # npm ci is preferred in CI environments for clean, reliable installs
      run: npm ci

    - name: Run Linter
      # Executes the "lint": "eslint ." script from package.json
      run: npm run lint

    - name: Type Check and Build
      # Executes "build": "tsc -b && vite build" to ensure TypeScript compiles correctly
      run: npm run build
